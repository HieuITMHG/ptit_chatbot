version: '3.8'

services:
  # 1. MongoDB
  mongodb:
    image: mongo:latest
    container_name: local_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. Qdrant (Vector Database)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: local_qdrant
    restart: always
    ports:
      - "6333:6333" # Port REST API
      - "6334:6334" # Port gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  # 3. MinIO (Giả lập AWS S3 ở Local)
  minio:
    image: minio/minio:latest
    container_name: local_minio
    restart: always
    ports:
      - "9000:9000" # Port API (Tương đương endpoint S3)
      - "9001:9001" # Port giao diện Web UI
    environment:
      MINIO_ROOT_USER: admin_s3     # Thay thế cho AWS_ACCESS_KEY_ID
      MINIO_ROOT_PASSWORD: password_s3 # Thay thế cho AWS_SECRET_ACCESS_KEY
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

# Khai báo Volumes để dữ liệu không bị mất khi tắt Docker
volumes:
  mongo_data:
  qdrant_data:
  minio_data: