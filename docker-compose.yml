services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    expose:
      - "8000"
    restart: always

  mongo:
    image: mongo
    restart: always
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=huuhieu123
      - MONGODB_INITDB_ROOT_PASSWORD=pass123


  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - api
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  redis:
    image: redis:8.6.2-alpine
    
  celery_worker:
    build: .
    depends_on:
      - redis
