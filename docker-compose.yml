services:
  redis:
    image: redis:7
    container_name: local_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: rag_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - redis

  worker:
    build: .
    container_name: celery_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - redis