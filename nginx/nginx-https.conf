events {}

http {

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;
    limit_req_status 429;

    server {
        listen 80;
        server_name suvitech.io.vn;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name suvitech.io.vn;

        ssl_certificate /etc/letsencrypt/live/suvitech.io.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/suvitech.io.vn/privkey.pem;

        location /api/ {
            limit_req zone=api_limit burst=5 nodelay;

            rewrite ^/api/(.*) /$1 break; 
            proxy_pass http://api:8000;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /docs { proxy_pass http://api:8000/docs; }
        location /openapi.json { proxy_pass http://api:8000/openapi.json; }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }
    }
}