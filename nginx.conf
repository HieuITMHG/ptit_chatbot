events {}

http {
    server {
        listen 80;
        server_name suvitech.io.vn;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name suvitech.io.vn;

        ssl_certificate /etc/letsencrypt/live/suvitech.io.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/suvitech.io.vn/privkey.pem;

        location /api/ {
            rewrite ^/api/(.*) /$1 break; 
            proxy_pass http://api:8000;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /docs { proxy_pass http://api:8000/docs; }
        location /openapi.json { proxy_pass http://api:8000/openapi.json; }

        location / {
            proxy_pass http://ptit_react_frontend:5173; 
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}