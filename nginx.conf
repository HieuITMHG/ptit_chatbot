events {}

http {
    upstream fastapi {
        server api:8000;
    }

    server {
        listen 80;
        server_name suvitech.io.vn;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name suvitech.io.vn;

        ssl_certificate /etc/letsencrypt/live/suvitech.io.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/suvitech.io.vn/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://fastapi;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_read_timeout 3600s; # Tăng timeout để tránh ngắt kết nối khi AI suy nghĩ lâu
            proxy_send_timeout 3600s;
        }
    }
}