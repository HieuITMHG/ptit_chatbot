version: "3.9"

x-healthcheck-defaults: &healthcheck_base
  interval: 10s       
  timeout: 5s        
  retries: 5          
  start_period: 10s 

services:
  api:
    build: .
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    volumes:
      - .:/app

  celery_worker:
    build: .
    command: celery -A app.worker worker --loglevel=debug
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.dev
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *healthcheck_base 
      test: ["CMD", "redis-cli", "ping"]

  mongo:
    image: mongo:7
    env_file:
      - .env.dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      <<: *healthcheck_base
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]

  qdrant:
    image: qdrant/qdrant:v1.7.3
    ports:
      - "6333:6333"
    env_file:
      - .env.dev
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      <<: *healthcheck_base
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env.dev
    volumes:
      - minio_data:/data
    healthcheck:
      <<: *healthcheck_base
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]

volumes:
  mongo_data:
  redis_data:
  qdrant_data:
  minio_data: